name: Setup Node & pnpm
description: Composite action to setup Node.js, enable pnpm, restore cache and install dependencies
inputs:
  node-version:
    description: 'Node.js version'
    required: false
    default: '20'
  install-deps:
    description: 'Whether to install dependencies'
    required: false
    default: 'true'
  cache-key-suffix:
    description: 'Optional cache key suffix'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable corepack and pnpm
      run: |
        corepack enable
        corepack prepare pnpm@latest --activate

    - name: Get pnpm store directory
      id: pnpm-cache
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          ~/.local/share/pnpm
          .turbo
          **/node_modules
        key: ${{ runner.os }}-node${{ inputs.node-version }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}${{ inputs.cache-key-suffix }}
        restore-keys: |
          ${{ runner.os }}-node${{ inputs.node-version }}-pnpm-
          ${{ runner.os }}-

    - name: Install dependencies
      if: ${{ inputs.install-deps == 'true' }}
      run: |
        echo "📥 Installing dependencies..."
        pnpm install --frozen-lockfile
        echo "✅ Dependencies installed"
