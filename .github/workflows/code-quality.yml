name: Code Quality & Linting

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [18, 20]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.pnpm-cache.outputs.STORE_PATH }}
            ~/.local/share/pnpm
            .turbo
            **/node_modules
          key: ${{ runner.os }}-node${{ matrix.node-version }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node-version }}-pnpm-
            ${{ runner.os }}-

      - name: Install dependencies
        run: |
          echo "📥 Installing dependencies..."
          pnpm install --frozen-lockfile
          echo "✅ Dependencies installed"

      - name: Verify lockfile integrity
        run: |
          echo "🔒 Verifying pnpm-lock.yaml integrity..."
          pnpm install --frozen-lockfile --prefer-offline
          echo "✅ Lockfile is valid and in sync"

      - name: Run ESLint
        run: |
          echo "🔍 Running ESLint..."
          pnpm -w exec turbo lint
          echo "✅ Linting passed"

      - name: Check for unused dependencies
        continue-on-error: true
        run: |
          echo "🔍 Checking for unused dependencies..."
          npx depcheck --ignores="@types/*,eslint-*,prettier,typescript,turbo,vitest,@vitest/*" || echo "⚠️  Found unused dependencies (non-blocking)"

      - name: Generate summary
        if: always()
        run: |
          echo "## 🔍 Code Quality Results (Node ${{ matrix.node-version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ **All checks passed**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some checks failed**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Lockfile verification: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- ESLint: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Unused dependencies check: ⚠️  (non-blocking)" >> $GITHUB_STEP_SUMMARY

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [18, 20]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.pnpm-cache.outputs.STORE_PATH }}
            ~/.local/share/pnpm
            .turbo
            **/node_modules
          key: ${{ runner.os }}-node${{ matrix.node-version }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node-version }}-pnpm-
            ${{ runner.os }}-

      - name: Install dependencies
        run: |
          echo "📥 Installing dependencies..."
          pnpm install --frozen-lockfile
          echo "✅ Dependencies installed"

      - name: Run TypeScript type check
        run: |
          echo "🔎 Running TypeScript type check..."
          pnpm -w exec turbo type-check
          echo "✅ Type check passed"

      - name: Generate summary
        if: always()
        run: |
          echo "## 📝 TypeScript Check Results (Node ${{ matrix.node-version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ **No type errors found**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Type errors detected**" >> $GITHUB_STEP_SUMMARY
          fi

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    if: always()
    
    steps:
      - name: Check quality gate
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.typecheck.result }}" != "success" ]; then
            echo "❌ Quality gate failed"
            echo "- Lint: ${{ needs.lint.result }}"
            echo "- TypeCheck: ${{ needs.typecheck.result }}"
            exit 1
          else
            echo "✅ Quality gate passed - all checks successful"
          fi

      - name: Summary
        run: |
          echo "## 🎉 Quality Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeCheck | ${{ needs.typecheck.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
