name: Supabase Health Check

on:
  workflow_call:
    outputs:
      status:
        description: 'Supabase health status'
        value: ${{ jobs.health-check.outputs.status }}
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'supabase/**'
      - 'packages/db/**'

concurrency:
  # Use a distinct concurrency group for the reusable workflow to avoid
  # deadlocks with callers that use their own concurrency group.
  group: supabase-health-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  health-check:
    name: Supabase Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      status: ${{ steps.health.outputs.status }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Start Supabase
        run: |
          cd supabase
          supabase start
        timeout-minutes: 10

      - name: Wait for Supabase to be ready
        run: |
          echo "Waiting for Supabase services to be fully ready..."
          sleep 10
          
          # Check if services are responding
          for i in {1..30}; do
            if curl -f http://localhost:54321/rest/v1/ -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0" > /dev/null 2>&1; then
              echo "✅ Supabase API is responding"
              break
            fi
            echo "Waiting for API... (attempt $i/30)"
            sleep 2
          done

      - name: Verify Supabase status
        id: status
        run: |
          echo "📊 Checking Supabase status..."
          supabase status
          
          # Export status for other jobs
          echo "status=healthy" >> $GITHUB_OUTPUT

      - name: Get database connection info
        run: |
          echo "🔍 Database Connection Info:"
          supabase status | grep -E "(Project URL|URL|Studio)" || echo "Status output captured above"

      - name: Test database connection
        run: |
          echo "🔌 Testing database connection..."
          
          # Test connection using psql with standard local credentials
          PGPASSWORD=postgres psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -c "SELECT version();"
          
          echo "✅ Database connection successful"

      - name: Verify schema migration
        run: |
          echo "📋 Checking database schema..."
          
          # Check if main tables exist (disable pager to avoid interactive hangs)
          PAGER=cat PGPASSWORD=postgres psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -c "\dt public.*" || echo "No tables found"
          
          echo "✅ Schema check complete"

      - name: Run database health checks
        id: health
        run: |
          echo "🏥 Running health checks..."
          
          # Check database version
          echo "Database version:"
          PGPASSWORD=postgres psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -c "SELECT version();"
          
          # Check if we can create and drop a test table
          echo "Testing write permissions:"
          PGPASSWORD=postgres psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -c "CREATE TABLE IF NOT EXISTS _health_check (id serial PRIMARY KEY, checked_at timestamp DEFAULT now());"
          PGPASSWORD=postgres psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -c "INSERT INTO _health_check DEFAULT VALUES;"
          PGPASSWORD=postgres psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -c "SELECT COUNT(*) as health_check_rows FROM _health_check;"
          PGPASSWORD=postgres psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -c "DROP TABLE _health_check;"
          
          echo "✅ All health checks passed"
          echo "status=healthy" >> $GITHUB_OUTPUT

      - name: Test API endpoints
        run: |
          echo "🌐 Testing Supabase API endpoints..."
          
          ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0"
          
          # Test REST API
          echo "Testing REST API..."
          curl -f http://localhost:54321/rest/v1/ \
            -H "apikey: $ANON_KEY" \
            -H "Content-Type: application/json"
          
          # Test Auth API
          echo -e "\nTesting Auth API..."
          curl -f http://localhost:54321/auth/v1/health \
            -H "apikey: $ANON_KEY"
          
          echo -e "\n✅ API endpoints are healthy"

      - name: Test with seed data
        run: |
          echo "🌱 Testing with seed data..."
          
          # Check if seed.sql exists and run it
          if [ -f "supabase/seed.sql" ]; then
            echo "Running seed.sql..."
            PGPASSWORD=postgres psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -f supabase/seed.sql
            echo "✅ Seed data loaded successfully"
          else
            echo "⚠️  No seed.sql found, skipping"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Supabase Health Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Supabase Start | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| Database Connection | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| Schema Migration | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| Health Checks | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| API Endpoints | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Supabase is healthy and ready for use" >> $GITHUB_STEP_SUMMARY

      - name: Stop Supabase
        if: always()
        run: |
          cd supabase
          supabase stop || true
