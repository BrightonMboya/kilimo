name: Dependency Updates

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-dependencies:
    name: Update Node Dependencies (pnpm)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Enable corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Update dependencies (interactive-friendly)
        run: |
          # Update workspace dependencies to latest semver-compatible versions
          pnpm -w up --latest

      - name: Create Pull Request with updated lockfile
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): pnpm update all workspaces'
          title: '🔄 Automated Dependency Updates (pnpm)'
          body: |
            Automated dependency update generated by workflow.
            Please run the CI checks and review changes before merging.
          branch: automated/dependency-updates
          # Use repository default branch as base to avoid hard-coding (falls back to repo default)
          base: ${{ github.event.repository.default_branch }}
          labels: |
            dependencies
            automated
