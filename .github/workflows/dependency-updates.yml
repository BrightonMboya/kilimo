name: Dependency Updates

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-dependencies:
    name: Update Node Dependencies (pnpm)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Enable corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Update dependencies (interactive-friendly)
        run: |
          # Update workspace dependencies to latest semver-compatible versions
          pnpm -w up --latest

      - name: Install updated dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests to validate updates
        run: |
          pnpm -w exec turbo lint
          pnpm -w exec turbo type-check
          pnpm -w exec turbo build
        continue-on-error: false

      - name: Generate update summary
        if: always()
        run: |
          echo "## 🔄 Dependency Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Linting: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Type checking: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

      - name: Create Pull Request with updated lockfile
        if: success()
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): pnpm update all workspaces'
          title: '🔄 Automated Dependency Updates (pnpm)'
          body: |
            Automated dependency update generated by workflow.
            
            ✅ All CI checks passed:
            - Linting
            - Type checking
            - Build
            
            Please review changes before merging.
          branch: automated/dependency-updates
          # Use repository default branch as base to avoid hard-coding (falls back to repo default)
          base: ${{ github.event.repository.default_branch }}
          labels: |
            dependencies
            automated
