name: Update PR checklist after CI

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]

permissions:
  pull-requests: write
  actions: read
  contents: read

jobs:
  update-pr-checklist:
    if: ${{ github.event.workflow_run.head_repository.full_name == github.repository && github.event.workflow_run.head_branch != github.event.repository.default_branch }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update PR automated checklist
        uses: actions/github-script@v7
        with:
          script: |
            const script = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/update-pr-checklist.js`);
            const headBranch = '${{ github.event.workflow_run.head_branch }}';
            const runId = ${{ github.event.workflow_run.id }};
            const runUrl = '${{ github.event.workflow_run.html_url }}';
            const conclusion = '${{ github.event.workflow_run.conclusion }}';
            await script({ github, context, core, headBranch, runId, runUrl, conclusion });
