name: CI/CD Pipeline

on:
  push: {}
  pull_request:
    branches: [ main, master, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Enable corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Cache pnpm store and turbo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            ~/.local/share/pnpm
            .turbo
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # - name: Run formatting check (prettier)
      #   run: pnpm -w exec prettier --check "**/*.{ts,tsx,md,json,js}"

      - name: Run lint (turbo)
        run: pnpm -w exec turbo lint

      - name: Run type-check (turbo)
        run: pnpm -w exec turbo type-check

  test:
    name: API Tests with Postgres
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: kilimo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Enable corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Cache pnpm store and turbo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            ~/.local/share/pnpm
            .turbo
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install netcat for DB check
        run: sudo apt-get update && sudo apt-get install -y netcat-openbsd

      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres to accept connections..."
          for i in {1..30}; do
            nc -z localhost 5432 && echo "Postgres is up" && break
            sleep 2
          done

      - name: Set test DB env
        run: |
          echo "DATABASE_URL=postgresql://postgres:password@localhost:5432/kilimo_test" >> $GITHUB_ENV
          echo "DIRECT_URL=postgresql://postgres:password@localhost:5432/kilimo_test" >> $GITHUB_ENV

      - name: Push Prisma schema to test DB
        working-directory: packages/db
        run: pnpm exec prisma db push --skip-generate

      - name: Run API tests
        working-directory: packages/api
        env:
          NODE_ENV: test
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Enable corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Cache pnpm store and turbo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            ~/.local/share/pnpm
            .turbo
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (turbo)
        run: pnpm -w exec turbo build

  create-failure-issue:
    name: Create Issue on Failure
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: failure()
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const script = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/create-failure-issue.js`);
            await script({ github, context, needs: ${{ toJson(needs) }} });
  close-success-issue:
    name: Close Issue on Success
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: success()
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Close related issues
        uses: actions/github-script@v7
        with:
          script: |
            const script = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/close-success-issue.js`);
            await script({ github, context, needs: ${{ toJson(needs) }} });
