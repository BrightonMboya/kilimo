name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches: [ main, master, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Cache pnpm store and turbo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            ~/.local/share/pnpm
            .turbo
            **/node_modules
          key: ${{ runner.os }}-node${{ matrix.node-version }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node-version }}-pnpm-
            ${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify lockfile
        run: |
          echo "Checking if lockfile is in sync..."
          pnpm install --frozen-lockfile --prefer-offline
          echo "✅ Lockfile is valid and in sync"

      # - name: Check code formatting (Prettier)
      #   run: |
      #     echo "Checking code formatting..."
      #     pnpm prettier --check "**/*.{ts,tsx,js,jsx,json,md}" || (
      #       echo "❌ Code formatting issues found. Run 'pnpm format' to fix."
      #       exit 1
      #     )
      #     echo "✅ Code formatting is correct"

      - name: Check for unused dependencies
        run: |
          echo "Checking for unused dependencies..."
          npx depcheck --ignores="@types/*,eslint-*,prettier,typescript,turbo,vitest,@vitest/*" || echo "⚠️ Found unused dependencies (non-blocking)"

      - name: Run lint (turbo)
        run: pnpm -w exec turbo lint

      - name: Run type-check (turbo)
        run: pnpm -w exec turbo type-check

      - name: Generate lint summary
        if: always()
        run: |
          echo "## 🔍 Code Quality Results" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Lockfile verification passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code formatting checked" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Linting completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Type checking completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Unused dependencies checked" >> $GITHUB_STEP_SUMMARY
          echo "- Node version: ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY

  test:
    name: API Tests with Postgres
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    strategy:
      matrix:
        node-version: [18, 20]
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kilimo_test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Cache pnpm store and turbo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            ~/.local/share/pnpm
            .turbo
            **/node_modules
          key: ${{ runner.os }}-node${{ matrix.node-version }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node-version }}-pnpm-
            ${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set test DB env
        run: |
          echo "DATABASE_URL=postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}" >> $GITHUB_ENV
          echo "DIRECT_URL=postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}" >> $GITHUB_ENV

      - name: Push Prisma schema to test DB
        working-directory: packages/db
        run: pnpm exec prisma db push --skip-generate

      - name: Run API tests with coverage
        working-directory: packages/api
        env:
          NODE_ENV: test
        run: |
          echo "Running tests with coverage..."
          pnpm test -- --coverage --coverage.threshold.lines=80 --coverage.threshold.functions=80 --coverage.threshold.branches=70 --coverage.threshold.statements=80
          echo "✅ Tests passed with coverage requirements met"

      - name: Upload test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-node${{ matrix.node-version }}
          path: packages/api/coverage
          retention-days: 7

      - name: Generate test summary
        if: always()
        run: |
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- Node version: ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Database: PostgreSQL 15" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "- Status: ✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Status: ❌ Tests failed" >> $GITHUB_STEP_SUMMARY
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Cache pnpm store and turbo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            ~/.local/share/pnpm
            .turbo
            **/node_modules
          key: ${{ runner.os }}-node${{ matrix.node-version }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node-version }}-pnpm-
            ${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (turbo)
        run: pnpm -w exec turbo build

      - name: Analyze bundle size
        run: |
          echo "## 📦 Bundle Size Analysis" >> $GITHUB_STEP_SUMMARY
          if [ -d "apps/nextjs/.next" ]; then
            echo "### Next.js Build Size:" >> $GITHUB_STEP_SUMMARY
            du -sh apps/nextjs/.next >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Detailed breakdown</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            du -h apps/nextjs/.next/* | sort -rh | head -20 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check bundle size limits
        run: |
          echo "Checking bundle size limits..."
          NEXT_DIR="apps/nextjs/.next"
          if [ -d "$NEXT_DIR" ]; then
            SIZE=$(du -sm "$NEXT_DIR" | cut -f1)
            MAX_SIZE=500
            echo "Bundle size: ${SIZE}MB (limit: ${MAX_SIZE}MB)"
            if [ $SIZE -gt $MAX_SIZE ]; then
              echo "❌ Bundle size exceeds limit!"
              exit 1
            fi
            echo "✅ Bundle size within limits"
          fi

      - name: Generate build summary
        if: always()
        run: |
          echo "## 🏗️ Build Results" >> $GITHUB_STEP_SUMMARY
          echo "- Node version: ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Bundle size checked and within limits" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "- Status: ✅ Build successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Status: ❌ Build failed" >> $GITHUB_STEP_SUMMARY
          fi

  create-failure-issue:
    name: Create Issue on Failure
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: failure()
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const script = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/create-failure-issue.js`);
            await script({ github, context, needs: ${{ toJson(needs) }} });
  close-success-issue:
    name: Close Issue on Success
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: success()
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Close related issues
        uses: actions/github-script@v7
        with:
          script: |
            const script = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/close-success-issue.js`);
            await script({ github, context, needs: ${{ toJson(needs) }} });
