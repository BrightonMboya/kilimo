name: Create PR on CI Success

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]

permissions:
  pull-requests: write
  contents: read

jobs:
  create-pr:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_repository.full_name == github.repository && github.event.workflow_run.head_branch != github.event.repository.default_branch }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or reuse pull request
        uses: actions/github-script@v7
        with:
          script: |
            const script = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/create-pr-on-success.js`);
            const headBranch = '${{ github.event.workflow_run.head_branch }}';
            const baseBranch = '${{ github.event.repository.default_branch }}';
            const res = await script({ github, context, core, headBranch, baseBranch });
            if (res && res.pr_number) core.setOutput && core.setOutput('pr_number', res.pr_number);
            if (res && res.pr_url) core.setOutput && core.setOutput('pr_url', res.pr_url);
            return res;
