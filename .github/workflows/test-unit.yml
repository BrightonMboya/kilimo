name: Unit Tests

on:
  pull_request:
  workflow_run:
    workflows: ["Code Quality & Linting"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  supabase-health:
    name: Supabase Health (reusable)
    uses: ./.github/workflows/supabase-health.yml
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

  test-api:
    name: API Unit Tests
    runs-on: ubuntu-latest
    needs: [supabase-health]
    if: needs.supabase-health.result == 'success'

    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        node-version: [18, 20]

    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.pnpm-cache.outputs.STORE_PATH }}
            ~/.local/share/pnpm
            .turbo
          key: ${{ runner.os }}-node${{ matrix.node-version }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Clean Supabase state
        run: |
          cd supabase
          supabase stop --no-backup || true
          docker volume ls --filter label=com.supabase.cli.project=kilimo -q | xargs -r docker volume rm || true

      - name: Start Supabase
        run: |
          cd supabase
          supabase start
          sleep 10

      - name: Push Prisma schema
        run: pnpm --filter ./packages/db run db:push:local

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Seed database
        run: pnpm --filter ./packages/db run db:seed:local

      - name: Run API tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: |
          pnpm --filter ./packages/api run test:coverage \
            -- --coverage.threshold.lines=80 \
               --coverage.threshold.functions=80 \
               --coverage.threshold.branches=70 \
               --coverage.threshold.statements=80

      - name: Stop Supabase
        if: always()
        run: |
          cd supabase
          supabase stop

      - name: Upload coverage
        if: always() && !env.ACTS_RUNNING
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-node${{ matrix.node-version }}
          path: packages/api/coverage
          retention-days: 7

  test-gate:
    name: Test Gate
    runs-on: ubuntu-latest
    needs: [test-api]
    if: always()

    steps:
      - name: Enforce test gate
        run: |
          if [ "${{ needs.test-api.result }}" != "success" ]; then
            echo "❌ Test gate failed"
            exit 1
          else
            echo "✅ Test gate passed"
          fi
