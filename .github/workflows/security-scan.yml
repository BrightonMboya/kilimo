name: Security Scanning

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday at midnight
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate security summary
        if: always()
        run: |
          echo "## 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- Scan completed at: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- Tool: Trivy" >> $GITHUB_STEP_SUMMARY
          echo "- Check the Security tab for detailed results" >> $GITHUB_STEP_SUMMARY

  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Enable corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Run pnpm audit
        run: |
          pnpm audit --audit-level=moderate || echo "Vulnerabilities found - review needed"
        continue-on-error: true

      - name: Generate audit summary
        if: always()
        run: |
          echo "## 📦 Dependency Audit" >> $GITHUB_STEP_SUMMARY
          echo "- Tool: pnpm audit" >> $GITHUB_STEP_SUMMARY
          echo "- Review package vulnerabilities above" >> $GITHUB_STEP_SUMMARY
